  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, sans-serif;
      touch-action: manipulation;

    .btn {
      padding: 10px 16px;
      border-radius: 6px;
      cursor: pointer;
      border: none;
      font-size: 14px;
      white-space: nowrap;

  <script>
    // ==================== BASE DE DATOS ====================
    class Database {
      constructor() {
        this.db = null;
      }

      init() {
        const stored = localStorage.getItem('cde_data');
        this.db = stored ? JSON.parse(stored) : { deliveries: [], counter: 1 };
      }

      save() {
        localStorage.setItem('cde_data', JSON.stringify(this.db));
      }

      getAllDeliveries() {
        return this.db.deliveries;
      }

      getDelivery(id) {
        return this.db.deliveries.find(d => d.id === id);
      }

      createDelivery(delivery) {
        const newDelivery = Object.assign({}, delivery, { id: this.db.counter++ });
        this.db.deliveries.push(newDelivery);
        this.save();
        return newDelivery;
      }

      updateDelivery(id, data) {
        const idx = this.db.deliveries.findIndex(d => d.id === id);
        if (idx !== -1) {
          this.db.deliveries[idx] = Object.assign({}, this.db.deliveries[idx], data);
          this.save();
          return this.db.deliveries[idx];
        }
        return null;
      }

      deleteDelivery(id) {
        this.db.deliveries = this.db.deliveries.filter(d => d.id !== id);
        this.save();
      }

      duplicateDelivery(id) {
        const original = this.getDelivery(id);
        if (!original) return null;

        const newDelivery = Object.assign({}, original, { id: this.db.counter++ });
        delete newDelivery.firmaCliente;
        delete newDelivery.firmaIngeniero;
        delete newDelivery.nombreClienteFirma;
        delete newDelivery.nombreIngenieroFirma;

        this.db.deliveries.push(newDelivery);
        this.save();
        return newDelivery;
      }
    }

    const db = new Database();

    // ==================== APP STATE ====================
    class AppState {
      constructor() {
        this.view = 'list';
        this.deliveries = [];
        this.currentDelivery = null;
        this.search = '';
        this.tab = 'general';
        this.listeners = [];
      }

      setState(newState) {
        Object.assign(this, newState);
        this.notify();
      }

      subscribe(listener) {
        this.listeners.push(listener);
      }

      notify() {
        this.listeners.forEach(listener => listener());
      }
    }

    const appState = new AppState();

    // ==================== FUNCIONES DE NEGOCIO ====================
    function loadDeliveries() {
      appState.setState({ deliveries: db.getAllDeliveries() });
    }

    function createNewDelivery() {
      const delivery = {
        fechaEntrega: new Date().toISOString().split('T')[0],
        cliente: '',
        ticket: '',
        sitio: '',
        equipos: [],
        nombreIngeniero: '',
        nombreCliente: '',
        firmaIngeniero: null,
        firmaCliente: null
      };
      appState.setState({ currentDelivery: delivery, view: 'form', tab: 'general' });
    }

    function editDelivery(delivery) {
      appState.setState({ currentDelivery: delivery, view: 'form', tab: 'general' });
    }

    function duplicateDelivery(id) {
      const duplicated = db.duplicateDelivery(id);
      if (duplicated) {
        loadDeliveries();
        alert('CDE duplicada exitosamente');
      }
    }

    function deleteDelivery(id) {
      if (confirm('¿Eliminar esta Constancia de Entrega?')) {
        db.deleteDelivery(id);
        loadDeliveries();
      }
    }

    function saveDelivery() {
      if (appState.currentDelivery.id) {
        db.updateDelivery(appState.currentDelivery.id, appState.currentDelivery);
      } else {
        db.createDelivery(appState.currentDelivery);
      }
      loadDeliveries();
      appState.setState({ view: 'list' });
    }

    function updateField(field, value) {
      if (!appState.currentDelivery) return;
      appState.currentDelivery[field] = value;
    }

    function addEquipo() {
      if (!appState.currentDelivery.equipos) {
        appState.currentDelivery.equipos = [];
      }
      appState.currentDelivery.equipos.push({
        cantidad: 1,
        marca: '',
        modelo: '',
        serie: '',
        observaciones: ''
      });
      const tabContent = document.getElementById('tab-content');
      if (tabContent && appState.tab === 'equipos') {
        tabContent.innerHTML = renderTabContent();
      }
    }

    function removeEquipo(index) {
      appState.currentDelivery.equipos.splice(index, 1);
      const tabContent = document.getElementById('tab-content');
      if (tabContent && appState.tab === 'equipos') {
        tabContent.innerHTML = renderTabContent();
      }
    }

    function updateEquipo(index, field, value) {
      if (!appState.currentDelivery.equipos[index]) return;
      appState.currentDelivery.equipos[index][field] = value;
    }

      const setGris = (pdf) => pdf.setTextColor(191, 191, 191);
      const colorAzulOscuro = [0, 51, 69];
      const colorNegro = [0, 0, 0];

      const colorGrisClaro = [240, 240, 240];
      //Posiciones horizontales
      const xPosA = (anchoLetter / 20) * 1;
      const xPosB = (anchoLetter / 20) * 3.5;
      const xPosC = (anchoLetter / 20) * 6.3;
      const xPosD = (anchoLetter / 2) * 1;
      const xPosE = (anchoLetter / 20) * 11;
      const xPosEyF = (anchoLetter / 20) * 13;
      const xPosF = (anchoLetter / 20) * 15;
      const xPosFyG = (anchoLetter / 20) * 17;
      const xPosG = (anchoLetter / 20) * 19;
      const Columnas = (xPosG - xPosA);
      const ColumnaItem = xPosA + 3;

      const ColumnaMarca = ColumnaCant + 10;
      const ColumnaModelo = ColumnaMarca + 25;
      const ColumnaSerie = ColumnaModelo + 40;
      const ColumnaObservaciones = ColumnaSerie + 30;      
      //Posiciones verticales
      const yPosPie = anchoLetter;

      function agregarCabeza() {
        let yPosCabeza = 10;
        let divis = 70; // factor de redimensionamiento
        pdf.addImage(imgLogo, 'PNG', xPosG - (2587 / divis), yPosCabeza / 2, 2587 / divis, 822 / divis);

        pdf.setFontSize(tipoDato);
        setAzulOscuro(pdf);
        pdf.text('Fecha: ', xPosA, yPosCabeza);
        setAzul(pdf);
        pdf.text((delivery.fechaEntrega || ' '), (xPosA * 2.1), yPosCabeza);
        yPosCabeza += saltoLineaDoble;
        pdf.setFontSize(tipoTitulo);
        setAzulOscuro(pdf);
        pdf.setFont("helvetica", "bold");
        pdf.text('CONSTANCIA DE ENTREGA', xPosD, yPosCabeza, "center");
        pdf.setFont("helvetica", "normal");

        let yPos = 30;
        let yPosGraf = 30;
        let celdaAlto = 5.5;
        pdf.setFontSize(tipoDato);
        pdf.setFont("helvetica", "normal");

        pdf.setDrawColor(...colorGris);
        pdf.setFillColor(...colorAzulOscuro);
        setBlanco(pdf);
        pdf.setLineWidth(0.7);

        pdf.rect(xPosA, yPosGraf, xPosC - xPosA, celdaAlto, 'FD');
        pdf.rect(xPosA, yPosGraf, xPosG - xPosA, celdaAlto, 'D');
        yPosGraf += celdaAlto;
        pdf.rect(xPosA, yPosGraf, xPosC - xPosA, celdaAlto, 'FD');
        pdf.rect(xPosA, yPosGraf, xPosG - xPosA, celdaAlto, 'D');
        pdf.rect(xPosE, yPosGraf, xPosF - xPosE, celdaAlto, 'FD');

        yPos += saltoLineaMinimo;
        setBlanco(pdf);
        pdf.setFont("helvetica", "bold");
        pdf.text('Cliente: ', xPosA * 1.3, yPos);
        pdf.setFont("helvetica", "normal");
        setAzulOscuro(pdf);
        pdf.text((delivery.cliente || ' '), xPosEyF, yPos, "center");


        yPos += celdaAlto;
        setBlanco(pdf);
        pdf.setFont("helvetica", "bold");
        pdf.text('Ticket de Servicio: ', xPosA * 1.3, yPos);
        setAzulOscuro(pdf);
        pdf.setFont("helvetica", "normal");
        pdf.text((delivery.ticket || ' '), xPosC + ((xPosE - xPosC) / 2), yPos, "center");

        setBlanco(pdf);
        pdf.setFont("helvetica", "bold");
        pdf.text('Sitio: ', xPosEyF, yPos, "center");
        setAzulOscuro(pdf);
        pdf.setFont("helvetica", "normal");
        pdf.text((delivery.sitio || ' '), xPosFyG, yPos, "center");

        yPos += saltoLineaDoble;
        let consta1 = "Por medio de la presente se hace constar que la empresa  ";
        let empresa = "IBServices";
        let consta2 = " entregó el material que a continuación se describe:"
        // Tabla de equipos

        pdf.text(consta1, xPosA, yPos, { maxWidth: (xPosG - xPosA), align: 'justify' });
        let startX = (pdf.getStringUnitWidth(consta1) * tipoDato / pdf.internal.scaleFactor);
        pdf.setFont("helvetica", "bold");
        pdf.text(empresa, xPosA + startX, yPos, { maxWidth: (xPosG - xPosA), align: 'justify' });
        pdf.text(empresa, xPosA + startX, yPos, { maxWidth: (xPosG - xPosA), align: 'justify' });
        startX += (pdf.getStringUnitWidth(empresa) * tipoDato / pdf.internal.scaleFactor);
        pdf.setFont("helvetica", "normal");
        pdf.text(consta2, xPosA + startX, yPos);

        yPos += saltoLineaDoble;
        pdf.setFontSize(tipoDato);
        pdf.setFillColor(...colorAzulOscuro);
        pdf.rect(xPosA, yPos, (xPosG - xPosA), 8, 'F');
        setBlanco(pdf);
        
        
        pdf.text('#', ColumnaItem, yPos + 5, { align: 'left' });
        pdf.text('Cant.', ColumnaCant, yPos + 5, { align: 'left' });
        pdf.text('Marca', ColumnaMarca, yPos + 5, { align: 'left' });
        pdf.text('Modelo', ColumnaModelo, yPos + 5, { align: 'left' });
        pdf.text('N° Serie', ColumnaSerie, yPos + 5, { align: 'left' });
        pdf.text('Observaciones', ColumnaObservaciones, yPos + 5, { align: 'left' });
        yPos += 10;
        yHeaderTabla = yPos -2;

      };


      function agregarPie(xPagina = 1) {
        yPos = yPosPie;
        pdf.setFontSize(tipoSubtitulo);
        setAzulOscuro(pdf);
        pdf.text('Por IBServices', (anchoLetter * 0.25), yPos, { align: 'center' });
        pdf.text('Por Cliente', (anchoLetter * 0.75), yPos, { align: 'center' });
        yPos += saltoLineaMinimo;
        if (delivery.firmaIngeniero) {
          pdf.addImage(delivery.firmaIngeniero, 'PNG', (anchoLetter * 0.25) - 30, yPos, 60, 30);
        }
        if (delivery.firmaCliente) {
          pdf.addImage(delivery.firmaCliente, 'PNG', (anchoLetter * 0.75) - 30, yPos, 60, 30);
        }
        yPos += 30 + saltoLineaMinimo;
        pdf.setFontSize(tipoDato);
        setAzulOscuro(pdf);
        pdf.text((delivery.nombreIngeniero || ' '), (anchoLetter * 0.25), yPos, { align: 'center' });
        pdf.text((delivery.nombreCliente || ' '), (anchoLetter * 0.75), yPos, { align: 'center' });

        yPos += 30 + saltoLineaMinimo;
        pdf.setFontSize(tipoLeyenda);
        pdf.text('Estimado Cliente: revise y lea detenidamente esta constancia de entrega, su firma representa la aceptación de los materiales recibidos a su entera satisfacción. Gracias.', xPosD, yPosLeyenda, { maxWidth: (xPosG - xPosA), align: 'center' });
        divis = 1; // factor de redimensionamiento
        let anchoBarra = 54;
        
        pdf.addImage(imgBarra, 'PNG', xPosD - (anchoBarra / 2), yPosLeyenda + 3, anchoBarra, 1);
        
        pdf.text(xPagina + ' de ' + totalPaginas, xPosD, yPosLeyenda + 6.6, { maxWidth: (xPosE - xPosC), align: 'center' });
        
      };
      let yPos = 73.5;
      
      if (delivery.equipos && delivery.equipos.length > 0) {
        agregarCabeza();
        
        delivery.equipos.forEach((equipo, i) => {
          pdf.setFontSize(tipoRenglones);
          var altoRenglon = 1;
          setGris(pdf);
          pdf.text('' + (i + 1) || '-', ColumnaItem, yPos + 2);
          setAzulOscuro(pdf);
          pdf.text(equipo.cantidad || '1', ColumnaCant + 3, yPos + 2, { maxWidth: (8), align: 'left' });
          pdf.text(equipo.marca || '-', ColumnaMarca, yPos + 2, { maxWidth: (ColumnaModelo - ColumnaMarca - 3), align: 'left' });

          let renglones = [1];
          var lineasEquipoMarca = pdf.splitTextToSize(equipo.marca, (ColumnaModelo - ColumnaMarca - 3));
          var numeroDelineasEquipoMarca = lineasEquipoMarca.length;
          if ((numeroDelineasEquipoMarca >= 1) && (numeroDelineasEquipoMarca > altoRenglon)){ altoRenglon = numeroDelineasEquipoMarca;}
          
          pdf.text(equipo.modelo || '-', ColumnaModelo, yPos + 2, { maxWidth: (ColumnaSerie - ColumnaModelo -3), align: 'left' });
          var lineasEquipoModelo = pdf.splitTextToSize(equipo.modelo, (ColumnaSerie - ColumnaModelo - 3));
          var numeroDelineasEquipoModelo = lineasEquipoModelo.length;
          if ((numeroDelineasEquipoModelo >= 1) && (numeroDelineasEquipoModelo > altoRenglon)){ altoRenglon = numeroDelineasEquipoModelo;}
          
          pdf.text(equipo.serie || '-', ColumnaSerie, yPos + 2, { maxWidth: (ColumnaObservaciones - ColumnaSerie -3), align: 'left' });
          var lineasEquipoSerie = pdf.splitTextToSize(equipo.serie, (ColumnaObservaciones - ColumnaSerie -3));
          var numeroDelineasEquipoSerie = lineasEquipoSerie.length;
          if ((numeroDelineasEquipoSerie >= 1) && (numeroDelineasEquipoSerie > altoRenglon)){ altoRenglon = numeroDelineasEquipoSerie;}
          
          pdf.text(equipo.observaciones || '-', ColumnaObservaciones, yPos + 2, { maxWidth: (xPosG - ColumnaObservaciones), align: 'left' });
          var lineasEquipoObservaciones = pdf.splitTextToSize(equipo.observaciones, (xPosG - ColumnaObservaciones));
          var numeroDelineasEquipoObservaciones = lineasEquipoObservaciones.length;
          if ((numeroDelineasEquipoObservaciones >= 1) && (numeroDelineasEquipoObservaciones > altoRenglon)){ altoRenglon = numeroDelineasEquipoObservaciones;}

          yPos += (tipoRenglones * .6) * altoRenglon;
          pdf.setFillColor(...colorGrisClaro);
          pdf.line(xPosA, yPos-0.5, xPosG, yPos-0.5, 'F'); // horizontal line
          pdf.line(ColumnaCant - 2, yHeaderTabla, ColumnaCant - 2, yPos -2, 'F'); // vertical line
          pdf.line(ColumnaMarca - 2, yHeaderTabla, ColumnaMarca - 2, yPos -2, 'F'); // vertical line
          pdf.line(ColumnaModelo - 2, yHeaderTabla, ColumnaModelo - 2, yPos -2, 'F'); // vertical line
          pdf.line(ColumnaSerie - 2, yHeaderTabla, ColumnaSerie - 2, yPos -2, 'F'); // vertical line
          pdf.line(ColumnaObservaciones - 2, yHeaderTabla, ColumnaObservaciones - 2, yPos -2, 'F'); // vertical line

          altoRenglon = 1;
          if (yPos + (saltoLineaDoble) > (yPosPie - 5)) {
            
            pdf.addPage();
            paginaActual++;
            totalPaginas++;
            pdf.setPage(paginaActual);
            agregarCabeza();
            yPos = 73.5;
          }
        });


      } else {
        alert('No has agregado equipo o materiales para generar la CDE.');
        return;
      }


      const pageCount = pdf.internal.getNumberOfPages();
      for (let i = 1; i <= pageCount; i++) {
        pdf.setPage(i);
        agregarPie(i);
      }
      pdf.save('CDE_' + (delivery.ticket || delivery.id) + '.pdf');
    }

    // ==================== FIRMA ====================
    let canvasIngeniero, ctxIngeniero, canvasCliente, ctxCliente;
    let isDrawingIngeniero = false, isDrawingCliente = false;

    function initSignature() {
      canvasIngeniero = document.getElementById('signatureCanvasIngeniero');
      if (canvasIngeniero) {
        ctxIngeniero = canvasIngeniero.getContext('2d');
        canvasIngeniero.style.width = '100%';
        canvasIngeniero.style.height = 'auto';

        if (appState.currentDelivery.firmaIngeniero) {
          const img = new Image();
          img.onload = () => ctxIngeniero.drawImage(img, 0, 0, canvasIngeniero.width, canvasIngeniero.height);
          img.src = appState.currentDelivery.firmaIngeniero;
        }

        canvasIngeniero.addEventListener('mousedown', (e) => startDrawing(e, 'ingeniero'));
        canvasIngeniero.addEventListener('mousemove', (e) => draw(e, 'ingeniero'));
        canvasIngeniero.addEventListener('mouseup', () => stopDrawing('ingeniero'));
        canvasIngeniero.addEventListener('mouseleave', () => stopDrawing('ingeniero'));

        canvasIngeniero.addEventListener('touchstart', (e) => {
          e.preventDefault();
          const touch = e.touches[0];
          const mouseEvent = new MouseEvent('mousedown', {
            clientX: touch.clientX,
            clientY: touch.clientY
          });
          canvasIngeniero.dispatchEvent(mouseEvent);
        });

        canvasIngeniero.addEventListener('touchmove', (e) => {
          e.preventDefault();
          const touch = e.touches[0];
          const mouseEvent = new MouseEvent('mousemove', {
            clientX: touch.clientX,
            clientY: touch.clientY
          });
          canvasIngeniero.dispatchEvent(mouseEvent);
        });

        canvasIngeniero.addEventListener('touchend', (e) => {
          e.preventDefault();
          const mouseEvent = new MouseEvent('mouseup', {});
          canvasIngeniero.dispatchEvent(mouseEvent);
        });
      }

      canvasCliente = document.getElementById('signatureCanvasCliente');
      if (canvasCliente) {
        ctxCliente = canvasCliente.getContext('2d');
        canvasCliente.style.width = '100%';
        canvasCliente.style.height = 'auto';

        if (appState.currentDelivery.firmaCliente) {
          const img = new Image();
          img.onload = () => ctxCliente.drawImage(img, 0, 0, canvasCliente.width, canvasCliente.height);
          img.src = appState.currentDelivery.firmaCliente;
        }

        canvasCliente.addEventListener('mousedown', (e) => startDrawing(e, 'cliente'));
        canvasCliente.addEventListener('mousemove', (e) => draw(e, 'cliente'));
        canvasCliente.addEventListener('mouseup', () => stopDrawing('cliente'));
        canvasCliente.addEventListener('mouseleave', () => stopDrawing('cliente'));

        canvasCliente.addEventListener('touchstart', (e) => {
          e.preventDefault();
          const touch = e.touches[0];
          const mouseEvent = new MouseEvent('mousedown', {
            clientX: touch.clientX,
            clientY: touch.clientY
          });
          canvasCliente.dispatchEvent(mouseEvent);
        });

        canvasCliente.addEventListener('touchmove', (e) => {
          e.preventDefault();
          const touch = e.touches[0];
          const mouseEvent = new MouseEvent('mousemove', {
            clientX: touch.clientX,
            clientY: touch.clientY
          });
          canvasCliente.dispatchEvent(mouseEvent);
        });

        canvasCliente.addEventListener('touchend', (e) => {
          e.preventDefault();
          const mouseEvent = new MouseEvent('mouseup', {});
          canvasCliente.dispatchEvent(mouseEvent);
        });
      }
    }

    function getCanvasCoords(e, canvas) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;

      return {
        x: (e.clientX - rect.left) * scaleX,
        y: (e.clientY - rect.top) * scaleY
      };
    }

    function startDrawing(e, tipo) {
      const canvas = tipo === 'ingeniero' ? canvasIngeniero : canvasCliente;
      const ctx = tipo === 'ingeniero' ? ctxIngeniero : ctxCliente;

      if (tipo === 'ingeniero') isDrawingIngeniero = true;
      else isDrawingCliente = true;

      const coords = getCanvasCoords(e, canvas);
      ctx.beginPath();
      ctx.moveTo(coords.x, coords.y);
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.strokeStyle = '#000';
    }

    function draw(e, tipo) {
      const isDrawing = tipo === 'ingeniero' ? isDrawingIngeniero : isDrawingCliente;
      if (!isDrawing) return;

      const canvas = tipo === 'ingeniero' ? canvasIngeniero : canvasCliente;
      const ctx = tipo === 'ingeniero' ? ctxIngeniero : ctxCliente;

      const coords = getCanvasCoords(e, canvas);
      ctx.lineTo(coords.x, coords.y);
      ctx.stroke();
    }

    function stopDrawing(tipo) {
      if (tipo === 'ingeniero') isDrawingIngeniero = false;
      else isDrawingCliente = false;
    }

    function clearSignature(tipo) {
      const canvas = tipo === 'ingeniero' ? canvasIngeniero : canvasCliente;
      const ctx = tipo === 'ingeniero' ? ctxIngeniero : ctxCliente;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function saveSignature(tipo) {
      const canvas = tipo === 'ingeniero' ? canvasIngeniero : canvasCliente;
      const dataUrl = canvas.toDataURL();
      const field = tipo === 'ingeniero' ? 'firmaIngeniero' : 'firmaCliente';
      appState.currentDelivery[field] = dataUrl;
      alert('Firma ' + (tipo === 'ingeniero' ? 'del ingeniero' : 'del cliente') + ' guardada');
    }

    // ==================== INICIALIZACIÓN ====================
    db.init();
    loadDeliveries();

    appState.subscribe(() => {
      render();
      if (appState.tab === 'firmas') {
        setTimeout(initSignature, 100);
      }
    });

    render();
